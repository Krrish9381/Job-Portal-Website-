<!doctype html>
<html>
  <head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-5">
    <h2 class="text-xl font-bold p-2">Register</h2>
    <form class="flex flex-col max-w-md">
      <input
        type="text"
        placeholder="Name"
        class="border border-gray-800 p-3 mb-2"
      /><br />
      <input
        type="email"
        placeholder="Email"
        class="border border-gray-800 p-3 mb-2"
      /><br />
      <input
        type="password"
        placeholder="Password"
        class="border border-gray-800 p-3 mb-2"
      /><br />
      <button class="border border-gray-800 p-2">Register</button>
    </form>
    <p class="mt-4">
      Already have an account?
      <a href="login.html" class="text-blue-500">Login</a>
    </p>
    <br />
    <a href="index.html" class="text-blue-500">Home</a>
  </body>
</html>
