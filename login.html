<!doctype html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-6">
    <h1 class="text-xl font-bold p-2">Login</h1>
    <form class="flex flex-col max-w-md">
      <input
        type="email"
        placeholder="Email"
        class="border border-gray-800 p-3 mb-4"
      />
      <input
        type="password"
        placeholder="Password"
        class="border border-gray-800 p-3 mb-4"
      />
      <button class="border border-gray-800 p-2">Login</button>
    </form>
    <p class="mt-4">
      Don't have an account?
      <a href="register.html" class="text-blue-500">Register here</a>
    </p>
  </br>
    <a href="index.html">Home</a>
  </body>
</html>
