<!doctype html>
<html>
  <head>
    <title>Job Details</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h2 id="job-title"></h2>
    <p id="company"></p>
    <p id="location"></p>
    <p id="description"></p>

    <a href="jobs.html">← Back to Jobs</a>

    <script>
      const params = new URLSearchParams(window.location.search);
      const job = params.get("job");

      const jobs = {
        frontend: {
          title: "Frontend Developer",
          company: "Google",
          location: "Bangalore",
          description: "HTML, CSS, JavaScript, React",
        },
        backend: {
          title: "Backend Developer",
          company: "Amazon",
          location: "Hyderabad",
          description: "Node.js, Databases, APIs",
        },
        "data-scientist": {
          title: "Data Scientist",
          company: "Facebook",
          location: "Menlo Park",
          description: "Python, ML, Data Analysis",
        },
        uiux: {
          title: "UI/UX Designer",
          company: "Apple",
          location: "Cupertino",
          description: "Figma, UX Research",
        },
        devops: {
          title: "DevOps Engineer",
          company: "Microsoft",
          location: "Redmond",
          description: "AWS, Docker, CI/CD",
        },
        fullstack: {
          title: "Full Stack Developer",
          company: "Netflix",
          location: "Los Gatos",
          description: "MERN Stack",
        },
        mobile: {
          title: "Mobile App Developer",
          company: "Uber",
          location: "San Francisco",
          description: "Android / iOS",
        },
        ml: {
          title: "ML Engineer",
          company: "IBM",
          location: "Armonk",
          description: "AI, ML Models",
        },
        cloud: {
          title: "Cloud Architect",
          company: "Oracle",
          location: "Redwood City",
          description: "Cloud Infrastructure",
        },
      };

      const selectedJob = jobs[job];

      document.getElementById("job-title").innerText = selectedJob.title;
      document.getElementById("company").innerText =
        "Company: " + selectedJob.company;
      document.getElementById("location").innerText =
        "Location: " + selectedJob.location;
      document.getElementById("description").innerText =
        selectedJob.description;
    </script>
  </body>
</html>
