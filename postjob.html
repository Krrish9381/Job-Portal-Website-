<!doctype html>
<html>
  <head>
    <title>Post a Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="p-6">
    <h2 class="text-xl font-bold mb-4">Post Job</h2>
    <form class="flex flex-col max-w-md">
      <input
        type="text"
        placeholder="Job Title"
        class="border border-gray-800 rounded p-2"
        required
      /><br />

      <input
        type="text"
        placeholder="Company Name"
        class="border border-gray-800 rounded p-2"
        required
      /><br />

      <input
        type="text"
        placeholder="Location"
        class="border border-gray-800 rounded p-2"
      />
      <br />
      <textarea
        placeholder="Job Description"
        class="border border-gray-800 rounded p-2"
      ></textarea>
      <br />
      <button type="submit" class="border border-gray-800 rounded p-2">
        Post Job
      </button>
    </form>
  </body>
</html>
